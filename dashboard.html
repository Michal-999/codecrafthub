<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .courses-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .courses-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .course-card:hover {
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2);
            border-color: #8B5CF6;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .course-title {
            color: #8B5CF6;
            font-size: 1.3em;
            font-weight: 700;
            flex: 1;
        }

        .course-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 10px;
        }

        .status-not-started {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #555;
        }

        .meta-label {
            font-weight: 600;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f4f6;
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f4f6;
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 1.2em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            color: #8B5CF6;
            font-size: 1.8em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-header {
                flex-direction: column;
                gap: 10px;
            }

            .course-status {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 CodeCraftHub</h1>
            <p class="subtitle">Your Learning Management Platform</p>
        </header>

        <div id="messageContainer"></div>

        <section class="form-section">
            <h2>➕ Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" name="name" required placeholder="e.g., Advanced JavaScript">
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" name="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="courseDescription">Description *</label>
                        <textarea id="courseDescription" name="description" required placeholder="Describe your learning goals..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="addCourseBtn">
                    <span>Add Course</span>
                </button>
            </form>
        </section>

        <section class="courses-section">
            <h2>📖 My Courses</h2>
            <div id="coursesContainer" class="courses-grid"></div>
        </section>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ Edit Course</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" name="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="editCourseDescription">Description *</label>
                        <textarea id="editCourseDescription" name="description" required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>Update Course</span>
                </button>
            </form>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api/courses';

        function showMessage(message, type = 'success') {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;
            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function getStatusClass(status) {
            const statusMap = {
                'Not Started': 'status-not-started',
                'In Progress': 'status-in-progress',
                'Completed': 'status-completed'
            };
            return statusMap[status] || 'status-not-started';
        }

        async function fetchCourses() {
            showLoading();
            try {
                const response = await fetch(API_BASE_URL);

                if (!response.ok) {
                    throw new Error(`Failed to fetch courses: ${response.statusText}`);
                }

                const courses = await response.json();
                displayCourses(courses);
            } catch (error) {
                console.error('Error fetching courses:', error);
                showMessage(`Error loading courses: ${error.message}`, 'error');
                document.getElementById('coursesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p class="empty-state-text">Failed to load courses. Please ensure the API server is running.</p>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }

        function displayCourses(courses) {
            const container = document.getElementById('coursesContainer');

            if (!courses || courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p class="empty-state-text">No courses yet. Add your first course above!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <h3 class="course-title">${escapeHtml(course.name)}</h3>
                        <span class="course-status ${getStatusClass(course.status)}">${escapeHtml(course.status)}</span>
                    </div>
                    <p class="course-description">${escapeHtml(course.description)}</p>
                    <div class="course-meta">
                        <div class="meta-item">
                            <span class="meta-label">Target Date:</span>
                            <span>${formatDate(course.target_date)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Created:</span>
                            <span>${formatDate(course.created_at)}</span>
                        </div>
                    </div>
                    <div class="course-actions">
                        <button class="btn btn-success" onclick="openEditModal(${course.id})">
                            ✏️ Edit
                        </button>
                        <button class="btn btn-danger" onclick="deleteCourse(${course.id})">
                            🗑️ Remove
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const courseData = {
                name: formData.get('name'),
                description: formData.get('description'),
                target_date: formData.get('target_date'),
                status: formData.get('status')
            };

            if (!courseData.name || !courseData.description || !courseData.target_date || !courseData.status) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            const submitBtn = document.getElementById('addCourseBtn');
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> <span>Adding...</span>';

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`Failed to add course: ${response.statusText}`);
                }

                const newCourse = await response.json();
                showMessage('Course added successfully!', 'success');
                e.target.reset();
                await fetchCourses();
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage(`Error adding course: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        });

        let currentCourses = [];

        async function openEditModal(courseId) {
            if (currentCourses.length === 0) {
                showLoading();
                try {
                    const response = await fetch(API_BASE_URL);
                    if (!response.ok) throw new Error('Failed to fetch courses');
                    currentCourses = await response.json();
                } catch (error) {
                    showMessage(`Error loading course: ${error.message}`, 'error');
                    hideLoading();
                    return;
                } finally {
                    hideLoading();
                }
            }

            const course = currentCourses.find(c => c.id === courseId);
            if (!course) {
                showMessage('Course not found', 'error');
                return;
            }

            document.getElementById('editCourseId').value = course.id;
            document.getElementById('editCourseName').value = course.name;
            document.getElementById('editCourseDescription').value = course.description;
            document.getElementById('editTargetDate').value = course.target_date;
            document.getElementById('editCourseStatus').value = course.status;

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editCourseForm').reset();
        }

        document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseId = document.getElementById('editCourseId').value;
            const formData = new FormData(e.target);
            const courseData = {
                name: formData.get('name'),
                description: formData.get('description'),
                target_date: formData.get('target_date'),
                status: formData.get('status')
            };

            if (!courseData.name || !courseData.description || !courseData.target_date || !courseData.status) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`Failed to update course: ${response.statusText}`);
                }

                showMessage('Course updated successfully!', 'success');
                closeEditModal();
                currentCourses = [];
                await fetchCourses();
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage(`Error updating course: ${error.message}`, 'error');
            } finally {
                hideLoading();
            }
        });

        async function deleteCourse(courseId) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }

            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`Failed to delete course: ${response.statusText}`);
                }

                showMessage('Course deleted successfully!', 'success');
                currentCourses = [];
                await fetchCourses();
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage(`Error deleting course: ${error.message}`, 'error');
            } finally {
                hideLoading();
            }
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        fetchCourses();
    </script>
</body>
</html>
